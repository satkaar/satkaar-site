name: Deploy frontend to Scaleway

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  # Région et registry Scaleway (cohérents avec Terraform)
  SCW_REGION: fr-par
  SCW_REGISTRY_URL: rg.fr-par.scw.cloud
  SCW_REGISTRY_NAMESPACE: satkaar-dev
  SCW_FRONTEND_IMAGE_NAME: frontend

jobs:
  deploy-frontend:
    name: Build and deploy frontend to Scaleway
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Scaleway Container Registry
        env:
          SCW_REGISTRY_USERNAME: ${{ secrets.SCW_REGISTRY_USERNAME }}
          SCW_REGISTRY_PASSWORD: ${{ secrets.SCW_REGISTRY_PASSWORD }}
        run: |
          if [ -z "$SCW_REGISTRY_USERNAME" ] || [ -z "$SCW_REGISTRY_PASSWORD" ]; then
            echo "::error::SCW_REGISTRY_USERNAME and/or SCW_REGISTRY_PASSWORD secrets are not set."
            echo "::error::Add them in Settings → Secrets and variables → Actions."
            exit 1
          fi

          echo "$SCW_REGISTRY_PASSWORD" | docker login \
            "${SCW_REGISTRY_URL}" \
            -u "$SCW_REGISTRY_USERNAME" \
            --password-stdin

      - name: Build and push Docker image
        env:
          IMAGE_REPO: ${{ env.SCW_REGISTRY_URL }}/${{ env.SCW_REGISTRY_NAMESPACE }}/${{ env.SCW_FRONTEND_IMAGE_NAME }}
        run: |
          IMAGE_SHA_TAG="${IMAGE_REPO}:${GITHUB_SHA}"
          IMAGE_LATEST_TAG="${IMAGE_REPO}:latest"

          echo "Building image ${IMAGE_SHA_TAG}"
          docker build -t "${IMAGE_SHA_TAG}" -t "${IMAGE_LATEST_TAG}" .

          echo "Pushing image tags to Scaleway registry"
          docker push "${IMAGE_SHA_TAG}"
          docker push "${IMAGE_LATEST_TAG}"

          echo "Image pushed:"
          echo "  - ${IMAGE_SHA_TAG}"
          echo "  - ${IMAGE_LATEST_TAG}"

      - name: Install Scaleway CLI
        run: |
          curl -sSfL https://raw.githubusercontent.com/scaleway/scaleway-cli/master/scripts/get.sh | sh
          echo "$HOME/bin" >> $GITHUB_PATH
          scw version

      - name: Deploy Scaleway Serverless Container (frontend)
        env:
          SCW_ACCESS_KEY: ${{ secrets.SCW_REGISTRY_USERNAME }}
          SCW_SECRET_KEY: ${{ secrets.SCW_REGISTRY_PASSWORD }}
          SCW_DEFAULT_REGION: ${{ env.SCW_REGION }}
          SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_ORGANIZATION_ID }}
          SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_PROJECT_ID }}
          SCW_FRONTEND_CONTAINER_ID: ${{ secrets.SCW_FRONTEND_CONTAINER_ID }}
        run: |
          if [ -z "$SCW_ACCESS_KEY" ] || [ -z "$SCW_SECRET_KEY" ]; then
            echo "::error::SCW_ACCESS_KEY / SCW_SECRET_KEY (via SCW_REGISTRY_USERNAME / SCW_REGISTRY_PASSWORD) are not set."
            exit 1
          fi

          if [ -z "$SCW_FRONTEND_CONTAINER_ID" ]; then
            echo "::error::SCW_FRONTEND_CONTAINER_ID secret is not set."
            echo "::error::Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi

          FRONTEND_IMAGE="${SCW_REGISTRY_URL}/${SCW_REGISTRY_NAMESPACE}/${SCW_FRONTEND_IMAGE_NAME}:latest"
          echo "Updating container to use image: ${FRONTEND_IMAGE}"
          scw container container update "${SCW_FRONTEND_CONTAINER_ID}" region="${SCW_REGION}" registry-image="${FRONTEND_IMAGE}"

          echo "Deploying Scaleway container ID=${SCW_FRONTEND_CONTAINER_ID} in region=${SCW_REGION}"
          scw container container deploy "${SCW_FRONTEND_CONTAINER_ID}" region="${SCW_REGION}"

      - name: Show deployed Scaleway frontend URL
        env:
          SCW_ACCESS_KEY: ${{ secrets.SCW_REGISTRY_USERNAME }}
          SCW_SECRET_KEY: ${{ secrets.SCW_REGISTRY_PASSWORD }}
          SCW_DEFAULT_REGION: ${{ env.SCW_REGION }}
          SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_ORGANIZATION_ID }}
          SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_PROJECT_ID }}
          SCW_FRONTEND_CONTAINER_ID: ${{ secrets.SCW_FRONTEND_CONTAINER_ID }}
        run: |
          if [ -z "$SCW_FRONTEND_CONTAINER_ID" ]; then
            echo "::error::SCW_FRONTEND_CONTAINER_ID secret is not set."
            exit 1
          fi

          DOMAIN=$(scw container container get "${SCW_FRONTEND_CONTAINER_ID}" region="${SCW_REGION}" -o json | jq -r '.domain_name')

          if [ -z "$DOMAIN" ] || [ "$DOMAIN" = "null" ]; then
            echo "::error::Unable to retrieve frontend container domain name."
            exit 1
          fi

          echo "✅ Frontend déployé sur : https://${DOMAIN}"

